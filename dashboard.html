async function getUser() {

// ==============================
// Save Charity
async function saveCharity() {

    if (!(await isSubscribed())) {
        alert("Please subscribe to save charity");
        return;
    }

    const charity = document.getElementById("charitySelect").value;
    const percent = document.getElementById("charityPercent").value;

    if (!charity || !percent) {
        alert("Please select charity and percentage");
        return;
    }

    if (percent < 10) {
        alert("Minimum contribution is 10%");
        return;
    }

    document.getElementById("selectedCharity").innerText =
        `Charity: ${charity} | Contribution: ${percent}%`;
}

// ==============================
// Add Score
// ==============================
async function addScore() {
    if (!(await isSubscribed())) {
    alert("Please subscribe to add score");
    return;
    }
    const score = document.getElementById("scoreInput").value;
    const date = document.getElementById("dateInput").value;

    if (!score || !date) {
        alert("Please enter both score and date");
        return;
    }

    if (score < 1 || score > 45) {
        alert("Score must be between 1 and 45");
        return;
    }

    // Step 1: Get existing scores
    const { data: existingScores } = await supabaseClient
        .from("scores")
        .select("*")
        .order("date", { ascending: true });

    // Step 2: Keep only 5 scores
    // Step 2: Keep only 5 scores
    if (existingScores.length >= 5) {
    const oldest = existingScores[0];

  // 🔥 DELETE oldest score from DB
    await supabaseClient
    .from("scores")
    .delete()
    .eq("id", oldest.id);
    }
    // Step 3: Insert new score
    const { error } = await supabaseClient
        .from("scores")
        .insert([{ score: Number(score), date: date }]);

    if (error) {
        alert("Error saving score");
        console.log(error);
    } else {
        alert("Score added successfully!");
        fetchScores();
    }
}


// ==============================
// Fetch Scores
// ==============================
async function fetchScores() {
    const { data, error } = await supabaseClient
        .from("scores")
        .select("*")
        .order("date", { ascending: false })
        .limit(5);

    const scoreList = document.getElementById("scoreList");
    scoreList.innerHTML = "";

    data.forEach(item => {
        const li = document.createElement("li");
        const formattedDate = item.date.split("T")[0];

        li.textContent = `Score: ${item.score} | Date: ${formattedDate}`;
        scoreList.appendChild(li);
    });
}

async function loadSubscription() {

    const { data: { user } } = await supabaseClient.auth.getUser();

    if (!user) return;

    const { data } = await supabaseClient
        .from("subscriptions")
        .select("*")
        .eq("user_id", user.id)
        .order("created_at", { ascending: false })
        .limit(1);

    if (data.length > 0) {
        document.getElementById("sub-status").innerText =
            "Subscribed to " + data[0].plan + " plan";
    }
}

async function isSubscribed() {
    const { data: { user } } = await supabaseClient.auth.getUser();

    if (!user) {
        console.log("No user");
        return false;
    }

    const { data, error } = await supabaseClient
        .from("subscriptions")
        .select("*")
        .eq("user_id", user.id);

    console.log("User ID:", user.id);
    console.log("Subscription data:", data);
    console.log("Error:", error);

    return data && data.length > 0;
}
// ==============================
// Draw Winner (FIXED)
// ==============================
async function drawWinner() {

    if (!(await isSubscribed())) {
        alert("Please subscribe to run draw");
        return;
    }

    const today = new Date();
    const month = today.getMonth();

    const lastDrawMonth = localStorage.getItem("lastDrawMonth");
    if (lastDrawMonth == month) {
        alert("Draw already done this month");
  // DO NOT return
    }
    const listItems = document.querySelectorAll("#scoreList li");

    if (listItems.length === 0) {
        alert("No scores available");
        return;
    }

    const randomIndex = Math.floor(Math.random() * listItems.length);
    const winner = listItems[randomIndex].textContent;
    const scoreMatch = winner.match(/Score: (\d+)/);
    const scoreValue = scoreMatch ? Number(scoreMatch[1]) : 0;

    let resultMessage = "";

    if (scoreValue >= 40) {
        resultMessage = "🏆 Jackpot Winner (5 matches)";
    } else if (scoreValue >= 30) {
        resultMessage = "🎉 Great! (4 matches)";
    } else if (scoreValue >= 20) {
        resultMessage = "👍 Good (3 matches)";
    } else {
        resultMessage = "❌ No win";
    }
    document.getElementById("winnerResult").innerText =
    "🏆 Winner: " + winner + " | " + resultMessage;
    localStorage.setItem("lastDrawMonth", month);
}
async function loadParticipation() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) return;

    const { data, error } = await supabaseClient
        .from("scores")
        .select("*")
        .eq("user_id", user.id);

    if (!data || data.length === 0) {
        document.getElementById("participation").innerText =
            "No participation yet";
        return;
    }

    document.getElementById("participation").innerText =
        "You have entered " + data.length + " scores";
}
async function loadWinnings() {

    // Get logged-in user
    const { data: { user } } = await supabaseClient.auth.getUser();

    if (!user) return;

    // Fetch winnings data
    const { data, error } = await supabaseClient
        .from("winners")
        .select("*")
        .eq("user_id", user.id);

    // Debug (optional but helpful)
    console.log("Winnings data:", data);
    console.log("Error:", error);

    // Safety check (VERY IMPORTANT)
    if (error || !data) {
        document.getElementById("winnings").innerText = "Total Winnings: ₹0";
        return;
    }

    // Calculate total winnings
    let total = 0;

    if (data &&data.length > 0) {
        data.forEach(item => {
            total += item.amount || 0;
        });
    }

    // Display result
    document.getElementById("winnings").innerText =
        "Total Winnings: ₹" + total;
}
